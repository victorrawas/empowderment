<!DOCTYPE html>
<html>
  <head>

    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://www.jqueryscript.net/css/jquerysctipttop.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <div class="jquery-script-clear"></div>
    <div class="container">
      <div id="accordion" class="accordion-container">
        <h4 class="accordion-title">Accordion Title 1</h4>
        <div class="accordion-content">
          <p>Accordion Content 1</p>
        </div>
        <h4 class="accordion-title">Accordion Title 2</h4>
        <div class="accordion-content">
          <p>Accordion Content 2</p>
        </div>
        <h4 class="accordion-title">Accordion Title 3</h4>
        <div class="accordion-content">
          <p>Accordion Content 3</p>
        </div>
        <h4 class="accordion-title">Accordion Title 4</h4>
        <div class="accordion-content">
          <p>Accordion Content 4</p>
        </div>
        <h4 class="accordion-title">Accordion Title 5</h4>
        <div class="accordion-content">
          <p>Accordion Content 5</p>
        </div>
      </div>
    </div>
    <script>
      jQuery(function ($) {
        $(".accordion-content").css("display", "none");

        $(".accordion-title").click(function () {
          $(".accordion-title").not(this).removeClass("open");

          $(".accordion-title").not(this).next().slideUp(300);

          $(this).toggleClass("open");

          $(this).next().slideToggle(300);
        });
      });
    </script>
    <script type="text/javascript">
      var _gaq = _gaq || [];
      _gaq.push(["_setAccount", "UA-36251023-1"]);
      _gaq.push(["_setDomainName", "jqueryscript.net"]);
      _gaq.push(["_trackPageview"]);

      (function () {
        var ga = document.createElement("script");
        ga.type = "text/javascript";
        ga.async = true;
        ga.src =
          ("https:" == document.location.protocol
            ? "https://ssl"
            : "http://www") + ".google-analytics.com/ga.js";
        var s = document.getElementsByTagName("script")[0];
        s.parentNode.insertBefore(ga, s);
      })();
    </script>
    <script>
      try {
        fetch(
          new Request(
            "https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js",
            { method: "HEAD", mode: "no-cors" }
          )
        )
          .then(function (response) {
            return true;
          })
          .catch(function (e) {
            var carbonScript = document.createElement("script");
            carbonScript.src =
              "//cdn.carbonads.com/carbon.js?serve=CK7DKKQU&placement=wwwjqueryscriptnet";
            carbonScript.id = "_carbonads_js";
            document.getElementById("carbon-block").appendChild(carbonScript);
          });
      } catch (error) {

      }

  </body>
</html>
